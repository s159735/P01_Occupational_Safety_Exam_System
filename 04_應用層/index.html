<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乙級職安衛模擬測驗系統</title>
    <style>
        /* ============================================================
           全域重置與基礎樣式
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "微軟正黑體", "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #01579b 100%);
            color: #fff;
            overflow: hidden;
        }

        /* ============================================================
           主容器 - 毛玻璃效果
           ============================================================ */
        .container {
            text-align: center;
            padding: 50px 60px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            max-width: 520px;
            width: 90%;
            animation: fadeInUp 0.8s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ============================================================
           淡入動畫
           ============================================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============================================================
           Logo 圖示
           ============================================================ */
        .logo {
            font-size: 52px;
            margin-bottom: 12px;
            display: block;
        }

        /* ============================================================
           標題文字 - 漸層效果
           ============================================================ */
        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, #ffd54f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ============================================================
           副標題
           ============================================================ */
        .subtitle {
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 24px;
            letter-spacing: 1px;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.7);
        }

        /* ============================================================
           載入旋轉動畫 (Spinner)
           ============================================================ */
        .loading-spinner {
            display: inline-block;
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #ffd54f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 18px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           狀態文字 (動態更新)
           ============================================================ */
        .status-text {
            font-size: 15px;
            opacity: 0.85;
            margin-bottom: 6px;
            min-height: 28px;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.85);
        }

        .status-text.success {
            color: #a5d6a7;
            -webkit-text-fill-color: #a5d6a7;
        }

        .status-text.warning {
            color: #ffd54f;
            -webkit-text-fill-color: #ffd54f;
        }

        .status-text.error {
            color: #ef9a9a;
            -webkit-text-fill-color: #ef9a9a;
        }

        /* ============================================================
           手動連結 (預設隱藏，跳轉失敗時顯示)
           ============================================================ */
        .manual-link {
            display: none;
            margin-top: 14px;
            padding: 10px 28px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .manual-link a {
            color: #ffd54f;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
        }

        .manual-link a:hover {
            text-decoration: underline;
            color: #fff;
        }

        .manual-link.show {
            display: block;
        }

        /* ============================================================
           版本資訊
           ============================================================ */
        .version {
            margin-top: 22px;
            font-size: 12px;
            opacity: 0.35;
            letter-spacing: 1px;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.35);
        }

        /* ============================================================
           進度條
           ============================================================ */
        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ffd54f, #ff6f00);
            border-radius: 2px;
            animation: progress 2.5s ease forwards;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }
            30% {
                width: 45%;
            }
            70% {
                width: 80%;
            }
            100% {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    主容器
    ============================================================ -->
    <div class="container">

        <!-- Logo 圖示 -->
        <span class="logo">🏆</span>

        <!-- 標題 -->
        <div class="title">乙級職安衛模擬測驗系統</div>

        <!-- 副標題 -->
        <div class="subtitle">國家考試規格 · 電腦化測驗</div>

        <!-- 載入旋轉動畫 -->
        <div class="loading-spinner"></div>

        <!-- 狀態文字（JavaScript 動態更新） -->
        <div class="status-text" id="statusText">⏳ 正在載入系統主頁面...</div>

        <!-- 進度條 -->
        <div class="progress-bar">
            <div class="fill"></div>
        </div>

        <!-- 手動連結（預設隱藏，跳轉失敗時顯示） -->
        <div class="manual-link" id="manualLink">
            <a href="./系統主頁面.html">➡️ 點此手動進入系統</a>
        </div>

        <!-- 版本資訊 -->
        <div class="version">版本 10.2.0</div>

    </div>

    <!-- ============================================================
    JavaScript：跳轉邏輯
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. 初始化：顯示載入訊息
            // ============================================================

            console.log('🚀 入口頁面已載入 (v10.2.0)');

            var targetUrl = './系統主頁面.html';
            var statusEl = document.getElementById('statusText');
            var manualLink = document.getElementById('manualLink');

            // ============================================================
            // 2. 顯示手動連結（跳轉失敗時呼叫）
            // ============================================================

            function showManualLink(message) {
                statusEl.textContent = message;
                statusEl.className = 'status-text warning';
                manualLink.classList.add('show');
            }

            // ============================================================
            // 3. 檢查目標檔案是否存在
            // ============================================================

            function checkTargetFile() {
                console.log('🔍 檢查目標檔案:', targetUrl);

                fetch(targetUrl, { method: 'HEAD', cache: 'no-cache' })
                    .then(function(response) {
                        if (response.ok) {
                            console.log('✅ 目標檔案存在，準備跳轉');
                            statusEl.textContent = '✅ 系統準備完成，即將進入...';
                            statusEl.className = 'status-text success';

                            // 延遲 600ms 跳轉，讓使用者看到成功訊息
                            setTimeout(function() {
                                window.location.href = targetUrl;
                            }, 600);

                        } else {
                            console.warn('⚠️ 目標檔案回應異常:', response.status);
                            showManualLink('⚠️ 系統載入中，請稍候或手動進入');
                        }
                    })
                    .catch(function(error) {
                        console.warn('⚠️ 無法檢查目標檔案:', error.message);
                        showManualLink('⚠️ 無法自動載入，請手動進入系統');
                    });

                // ============================================================
                // 備用計時器：無論如何都在 3 秒後強制跳轉
                // ============================================================

                setTimeout(function() {
                    console.log('⏰ 備用計時器觸發，強制跳轉');
                    window.location.href = targetUrl;
                }, 3000);
            }

            // ============================================================
            // 4. 離線/線上狀態偵測
            // ============================================================

            window.addEventListener('offline', function() {
                statusEl.textContent = '⚠️ 網路連線中斷，請檢查網路後重試';
                statusEl.className = 'status-text error';
                manualLink.classList.add('show');
            });

            window.addEventListener('online', function() {
                if (!manualLink.classList.contains('show')) {
                    statusEl.textContent = '✅ 網路已恢復，準備跳轉...';
                    statusEl.className = 'status-text success';
                    setTimeout(function() {
                        window.location.href = targetUrl;
                    }, 500);
                }
            });

            // ============================================================
            // 5. 防止迴圈：檢查是否已在目標頁面
            // ============================================================

            if (window.location.pathname.includes('系統主頁面.html')) {
                console.warn('⚠️ 已在系統主頁面，無需跳轉');
                return;
            }

            // ============================================================
            // 6. 啟動檢查（DOM 載入完成後執行）
            // ============================================================

            if (document.readyState === 'complete') {
                checkTargetFile();
            } else {
                document.addEventListener('DOMContentLoaded', checkTargetFile);
            }

            console.log('✅ 入口頁面初始化完成');

        })();
    </script>

</body>
</html>
